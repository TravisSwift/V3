<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      <!-- =======================================================
         PAGE SEO
         Replace these values when creating a new page.
    ======================================================== -->
         PAGE SEO

     Replace these values for every new page:

     • Title
     • Description
     • Keywords
     • Open Graph Image
     • Open Graph URL
     • Twitter Image
     • Canonical URL

    <title>PAGE TITLE</title>

    <meta name="description" content="PAGE DESCRIPTION">
    <meta name="keywords" content="PAGE KEYWORDS">
    <meta name="author" content="SuperDoobie.com">

    <meta property="og:title" content="PAGE TITLE">
    <meta property="og:description" content="PAGE DESCRIPTION">
    <meta property="og:image" content="https://superdoobie.com/images/social/PAGE-IMAGE.png">
    <meta property="og:url" content="https://superdoobie.com/PAGE-URL">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PAGE TITLE">
    <meta name="twitter:description" content="PAGE DESCRIPTION">
    <meta name="twitter:image" content="https://superdoobie.com/images/social/PAGE-IMAGE.png">

    <link rel="canonical" href="https://superdoobie.com/PAGE-URL">

  <link rel="stylesheet" href="../css/framework.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/footer.css">
</head>

<body>

<div class="site-shell">

    <div id="header-placeholder"></div>

    <div class="site-layout">

        <aside class="site-sidebar site-sidebar-left">
            <div id="sidebar-left-placeholder"></div>
        </aside>

        <main class="site-main">
            <div class="comic-page">
                <p>
                    This is the reusable master content area.
                </p>
            </div>
        </main>

        <aside class="site-sidebar site-sidebar-right">
            <div id="sidebar-right-placeholder"></div>
        </aside>

    </div>

    <div id="footer-placeholder"></div>

</div>

<script>
    fetch("../components/header.html")
        .then(response => response.text())
        .then(html => {
            document.getElementById("header-placeholder").innerHTML = html;
        });

    fetch("../components/sidebar-left.html")
        .then(response => response.text())
        .then(html => {
            document.getElementById("sidebar-left-placeholder").innerHTML = html;
        });

    fetch("../components/sidebar-right.html")
        .then(response => response.text())
        .then(html => {
            document.getElementById("sidebar-right-placeholder").innerHTML = html;
        });

    fetch("../components/footer.html")
        .then(response => response.text())
        .then(html => {
            document.getElementById("footer-placeholder").innerHTML = html;

            document.getElementById("copyright-year").textContent =
                new Date().getFullYear();
        });
</script>

</body>
</html>
